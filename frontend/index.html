<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="NexusBoost helps ambitious brands grow with SEO, digital marketing, high-converting websites, and performance-driven content systems."
    />
    <meta name="robots" content="index, follow" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f6fbff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="canonical" href="https://nexusboost.com/" />
    <meta property="og:title" content="NexusBoost - Digital Marketing and SEO Growth Agency" />
    <meta
      property="og:description"
      content="NexusBoost helps ambitious brands grow with SEO, digital marketing, high-converting websites, and performance-driven content systems."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:image"
      content="https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=1200&q=80"
    />
    <meta property="og:site_name" content="NexusBoost" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>NexusBoost - Digital Marketing and SEO Growth Agency</title>
    <script>
      (function () {
        var storageKey = "nb_theme";
        var theme = "light";

        try {
          var storedTheme = localStorage.getItem(storageKey);
          if (storedTheme === "light" || storedTheme === "dark") {
            theme = storedTheme;
          } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
            theme = "dark";
          }
        } catch (error) {
          if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
            theme = "dark";
          }
        }

        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
